<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kombi Driver GPS Tracker — Harare Transit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-center items-center p-6">

  <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-emerald-400">🚍 Driver GPS Beacon</h1>
      <p class="text-sm text-gray-400 mt-1">City of Harare Public Transport System</p>
    </div>

    <!-- Registration Input -->
    <div>
      <label class="block text-xs uppercase font-semibold text-gray-400 mb-2">Vehicle Registration Number</label>
      <input id="reg-number" type="text" placeholder="e.g. ACZ-4412" value="ACZ-4412" 
        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-lg font-bold text-white focus:outline-none focus:border-emerald-500 uppercase">
    </div>

    <!-- Live Telemetry Status -->
    <div class="bg-gray-900/80 border border-gray-700/80 rounded-xl p-4 space-y-2 font-mono text-sm">
      <div class="flex justify-between">
        <span class="text-gray-400">Status:</span>
        <span id="status-text" class="text-amber-400 font-bold">Offline</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-400">Latitude:</span>
        <span id="lat-text" class="text-white">--</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-400">Longitude:</span>
        <span id="lng-text" class="text-white">--</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-400">Speed:</span>
        <span id="speed-text" class="text-emerald-400 font-bold">0 km/h</span>
      </div>
    </div>

    <!-- Toggle Tracking Button -->
    <button id="toggle-btn" onclick="toggleTracking()" 
      class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-lg transition duration-200 shadow-lg">
      Start Tracking Route
    </button>
  </div>

  <script>
    let watchId = null;
    let isTracking = false;
    const API_URL = 'https://harare-transit-tracker.onrender.com/api/v1/tracking/update';
    const API_KEY = 'harare_kombi_secret_2026';

    function toggleTracking() {
      const regInput = document.getElementById('reg-number').value.trim();
      if (!regInput) {
        alert('Please enter a vehicle registration number!');
        return;
      }

      const btn = document.getElementById('toggle-btn');
      const statusText = document.getElementById('status-text');

      if (!isTracking) {
        if ("geolocation" in navigator) {
          // Start watching GPS position in real-time
          watchId = navigator.geolocation.watchPosition(
            sendGpsUpdate,
            handleGpsError,
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
          );

          isTracking = true;
          btn.innerText = 'Stop Tracking';
          btn.className = 'w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-4 rounded-xl text-lg transition duration-200 shadow-lg';
          statusText.innerText = 'Transmitting GPS...';
          statusText.className = 'text-emerald-400 font-bold animate-pulse';
        } else {
          alert('Geolocation is not supported on this browser/device.');
        }
      } else {
        // Stop tracking
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        isTracking = false;
        btn.innerText = 'Start Tracking Route';
        btn.className = 'w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-lg transition duration-200 shadow-lg';
        statusText.innerText = 'Offline';
        statusText.className = 'text-amber-400 font-bold';
      }
    }

    async function sendGpsUpdate(position) {
      const regNumber = document.getElementById('reg-number').value.trim().toUpperCase();
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      // Convert m/s to km/h
      const speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;

      // Update UI elements
      document.getElementById('lat-text').innerText = lat.toFixed(6);
      document.getElementById('lng-text').innerText = lng.toFixed(6);
      document.getElementById('speed-text').innerText = `${speed} km/h`;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY
          },
          body: JSON.stringify({
            registration_number: regNumber,
            latitude: lat,
            longitude: lng,
            speed: speed
          })
        });

        if (!res.ok) console.warn('GPS Post failed with status:', res.status);
      } catch (err) {
        console.error('Error sending GPS update:', err);
      }
    }

    function handleGpsError(err) {
      console.error('GPS Location Error:', err.message);
      alert(`Location Error: ${err.message}. Ensure location/GPS services are turned ON.`);
    }
  </script>
</body>
</html>
